<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Tracker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #111;
  color: #f0f0f0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  font-size: 15px;
  padding-bottom: 60px;
}
h1 { font-size: 28px; font-weight: 900; color: #d4ff00; letter-spacing: 2px; text-transform: uppercase; }
.header { padding: 20px 16px 14px; background: #111; border-bottom: 1px solid #2a2a2a; }
.header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.week-pill { background: #d4ff00; color: #000; font-size: 12px; font-weight: 800; padding: 4px 12px; border-radius: 20px; text-transform: uppercase; }
.progress-track { background: #2a2a2a; border-radius: 4px; height: 6px; margin-bottom: 6px; }
.progress-fill { background: #d4ff00; height: 6px; border-radius: 4px; width: 0%; transition: width 0.3s; }
.progress-text { font-size: 12px; color: #888; }
.week-tabs { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid #2a2a2a; }
.week-tabs::-webkit-scrollbar { display: none; }
.wtab { flex-shrink: 0; background: #222; border: 1px solid #333; color: #888; font-size: 13px; font-weight: 600; padding: 6px 16px; border-radius: 20px; cursor: pointer; }
.wtab.active { background: #d4ff00; color: #000; border-color: #d4ff00; }
.section-head { font-size: 11px; font-weight: 700; letter-spacing: 3px; color: #555; text-transform: uppercase; padding: 16px 16px 8px; }
.day-card { margin: 0 12px 10px; background: #1c1c1c; border: 1px solid #2a2a2a; border-radius: 14px; overflow: hidden; }
.day-card.done { border-color: #4a7a20; background: #1a2410; }
.day-top { display: flex; align-items: center; padding: 14px; cursor: pointer; gap: 10px; -webkit-tap-highlight-color: transparent; user-select: none; }
.day-dot { width: 10px; height: 10px; border-radius: 50%; background: #333; flex-shrink: 0; }
.day-card.done .day-dot { background: #6ab030; }
.day-name { font-size: 17px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; flex: 1; }
.tag { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.5px; margin-left: 4px; }
.tag-run { background: #0d2040; color: #4a9eff; }
.tag-str { background: #200d40; color: #b47aff; }
.tag-ten { background: #0d3020; color: #4aee9a; }
.chevron { color: #555; font-size: 12px; transition: transform 0.3s; flex-shrink: 0; }
.day-card.open .chevron { transform: rotate(180deg); }
.day-body { display: none; padding: 0 14px 14px; border-top: 1px solid #2a2a2a; }
.day-card.open .day-body { display: block; }
.sess-title { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: #666; text-transform: uppercase; margin: 12px 0 8px; }
.task { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid #222; }
.task:last-of-type { border-bottom: none; }
.cb { width: 22px; height: 22px; border-radius: 6px; border: 2px solid #444; background: transparent; flex-shrink: 0; cursor: pointer; appearance: none; -webkit-appearance: none; margin-top: 1px; position: relative; }
.cb:checked { background: #d4ff00; border-color: #d4ff00; }
.cb:checked::after { content: ''; position: absolute; left: 5px; top: 2px; width: 8px; height: 12px; border: 2px solid #000; border-top: none; border-left: none; transform: rotate(45deg); }
.task-text { font-size: 14px; line-height: 1.4; flex: 1; }
.task-sub { font-size: 12px; color: #666; margin-top: 2px; }
.pain-section { margin-top: 14px; }
.pain-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: #666; text-transform: uppercase; margin-bottom: 8px; }
.pain-btns { display: flex; gap: 6px; flex-wrap: wrap; }
.pbtn { padding: 5px 12px; border-radius: 20px; border: 1.5px solid #333; background: transparent; color: #666; font-size: 12px; font-weight: 600; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.pbtn.sel0 { border-color: #4aaa4a; color: #4aaa4a; background: #0d2010; }
.pbtn.sel1 { border-color: #cccc40; color: #cccc40; background: #20200a; }
.pbtn.sel2 { border-color: #ff8030; color: #ff8030; background: #20100a; }
.pbtn.sel3 { border-color: #ff4040; color: #ff4040; background: #20080a; }
.notes-section { margin-top: 12px; }
.notes-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; color: #666; text-transform: uppercase; margin-bottom: 6px; }
textarea { width: 100%; background: #111; border: 1px solid #333; border-radius: 8px; color: #f0f0f0; font-family: inherit; font-size: 13px; padding: 10px; resize: none; min-height: 65px; outline: none; }
textarea:focus { border-color: #d4ff00; }
.done-btn { width: 100%; margin-top: 12px; padding: 12px; background: transparent; border: 1.5px solid #d4ff00; color: #d4ff00; font-family: inherit; font-size: 14px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; border-radius: 10px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.day-card.done .done-btn { background: #4a7a20; border-color: #4a7a20; color: #fff; }
.knee-card { margin: 0 12px 10px; background: #1a1010; border: 1px solid #5a2020; border-radius: 14px; padding: 14px; }
.knee-head { font-size: 14px; font-weight: 800; color: #ff7040; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.knee-note { font-size: 12px; color: #888; margin-bottom: 12px; line-height: 1.5; }
.stats-row { display: flex; gap: 8px; margin: 12px 12px 4px; }
.stat { flex: 1; background: #1c1c1c; border-radius: 12px; padding: 10px 6px; text-align: center; }
.stat-n { font-size: 26px; font-weight: 900; color: #d4ff00; line-height: 1; }
.stat-l { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <h1>Tracker</h1>
    <span class="week-pill" id="wkbadge">Week 1</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="pfill"></div></div>
  <div class="progress-text" id="ptxt">0 of 8 sessions completed</div>
</div>

<div class="week-tabs">
  <button class="wtab active" onclick="setWeek(1,this)">Week 1</button>
  <button class="wtab" onclick="setWeek(2,this)">Week 2</button>
  <button class="wtab" onclick="setWeek(3,this)">Week 3</button>
  <button class="wtab" onclick="setWeek(4,this)">Week 4</button>
  <button class="wtab" onclick="setWeek(5,this)">Week 5</button>
  <button class="wtab" onclick="setWeek(6,this)">Week 6</button>
</div>

<div id="main"></div>

<script>
var week = 1;
var S = {};

function save() { try { localStorage.setItem('tt3', JSON.stringify(S)); } catch(e) {} }
function load() { try { var x = localStorage.getItem('tt3'); if(x) S = JSON.parse(x); } catch(e) { S = {}; } }
function k(w,d,f) { return 'w'+w+'d'+d+'_'+f; }

function getDays(w) {
  var hill = w<=2 ? '6 x 20 sec hill sprints' : w<=4 ? '8 x 20 sec hill sprints' : '10 x 20 sec hill sprints';
  var lr = w<=2 ? '6 km easy flat run' : w<=4 ? '10 km easy run' : '12-13 km easy run';
  var rds = w<=2 ? '3 rounds' : w<=4 ? '4 rounds' : '4 rounds (advanced)';
  var tmp = w<=2 ? '3 km at tempo pace' : '3-4 km at tempo pace';
  var pu = w>=5 ? 'Decline push-ups - 10-15' : 'Push-ups - 10-15';
  var gb = w>=5 ? 'Single-leg glute bridges - 12 each' : 'Glute bridges - 15';

  return [
    { day:'Tuesday', sub:'Tennis evening', tags:['ten'], sessions:[
      { title:'Evening - Tennis', tasks:[
        {t:'Tennis session', s:'First session of the plan - ease in'}
      ]}
    ]},
    { day:'Wednesday', sub:'Workout B morning', tags:['str'], sessions:[
      { title:'Morning - Workout B: Pull + Stability ('+rds+')', tasks:[
        {t:'Warm-up: 5 min'},
        {t:'Back widows - 10 reps'},
        {t:'Reverse lunges - 10 each leg'},
        {t:'Single-leg Romanian deadlifts - 10 each leg'},
        {t:'Side plank - 30 sec each side'},
        {t:'Dead bugs - 12 reps'},
        {t:'Straight leg raises - 15 each leg', s:'Knee rehab add-on'}
      ]}
    ]},
    { day:'Thursday', sub:'Tempo run', tags:['run'], sessions:[
      { title:'Tempo Run', tasks:[
        {t:'Warm-up: 1 km easy jog'},
        {t:tmp, s:'Can talk in short sentences, not comfortably'},
        {t:'Cool down: 1 km easy jog'}
      ]}
    ]},
    { day:'Friday', sub:'Tennis + optional core', tags:['ten'], sessions:[
      { title:'Tennis', tasks:[{t:'Tennis session'}]},
      { title:'Optional: Core + Mobility (10-15 min)', tasks:[
        {t:'Hollow hold - 30 sec', s:'3 rounds'},
        {t:'Russian twists - 20 reps', s:'3 rounds'},
        {t:'Bird dogs - 12 each side', s:'3 rounds'},
        {t:'Hip flexor stretch - 30 sec each side', s:'3 rounds'}
      ]}
    ]},
    { day:'Saturday', sub:'Long run', tags:['run'], sessions:[
      { title:'Long Run', tasks:[
        {t:lr, s:'Easy conversational pace. Flat route - protect the knee.'}
      ]}
    ]},
    { day:'Sunday', sub:'Tennis', tags:['ten'], sessions:[
      { title:'Tennis', tasks:[{t:'Match play or social tennis'}]}
    ]},
    { day:'Monday', sub: w<=2 ? 'Easy flat run' : 'Hill sprints', tags:['run'], sessions:[
      { title: w<=2 ? 'Easy Flat Run (Knee Recovery)' : 'Speed - Hill Sprints', tasks: w<=2 ? [
        {t:'Warm-up: 5 min easy jog'},
        {t:'20-25 min easy flat run', s:'No hills until knee settles'},
        {t:'5 min cool down'}
      ] : [
        {t:'Warm-up: 5-10 min easy jog + drills'},
        {t:hill, s:'Walk down recovery'},
        {t:'5 min cool down'}
      ]}
    ]},
    { day:'Tuesday', sub:'Workout A + Tennis', tags:['str','ten'], sessions:[
      { title:'Morning - Workout A: Push + Legs ('+rds+')', tasks:[
        {t:'Warm-up: 5 min'},
        {t:pu},
        {t:'Bulgarian split squats - 10 each leg'},
        {t:gb},
        {t:'Pike push-ups - 8-10'},
        {t:'Plank - 30-45 sec'},
        {t:'Straight leg raises - 15 each leg', s:'Knee rehab add-on'}
      ]},
      { title:'Evening - Tennis', tasks:[{t:'Tennis session'}]}
    ]}
  ];
}

function tagEl(t) {
  var map = {run:'Run',str:'Strength',ten:'Tennis'};
  return '<span class="tag tag-'+t+'">'+map[t]+'</span>';
}

function render() {
  var ds = getDays(week);
  var total = ds.length;
  var done = 0;
  for(var i=0;i<total;i++) { if(S[k(week,i,'done')]) done++; }

  var html = '';

  html += '<div class="stats-row">';
  html += '<div class="stat"><div class="stat-n">'+done+'</div><div class="stat-l">Done</div></div>';
  html += '<div class="stat"><div class="stat-n">'+(total-done)+'</div><div class="stat-l">Left</div></div>';
  html += '<div class="stat"><div class="stat-n">3</div><div class="stat-l">Runs</div></div>';
  html += '<div class="stat"><div class="stat-n">4</div><div class="stat-l">Tennis</div></div>';
  html += '</div>';

  html += '<div class="section-head">Sessions</div>';

  for(var i=0;i<ds.length;i++) {
    var d = ds[i];
    var isDone = S[k(week,i,'done')] ? true : false;
    var isOpen = S[k(week,i,'open')] ? true : false;
    var note = S[k(week,i,'note')] || '';
    var pain = (S[k(week,i,'pain')] !== undefined) ? S[k(week,i,'pain')] : -1;

    var cls = 'day-card' + (isDone?' done':'') + (isOpen?' open':'');
    html += '<div class="'+cls+'" id="dc'+i+'">';
    html += '<div class="day-top" onclick="tog('+i+')">';
    html += '<div class="day-dot"></div>';
    html += '<div class="day-name">'+d.day+'</div>';
    for(var t=0;t<d.tags.length;t++) html += tagEl(d.tags[t]);
    html += '<div class="chevron">&#9660;</div>';
    html += '</div>';

    html += '<div class="day-body">';
    for(var si=0;si<d.sessions.length;si++) {
      var sess = d.sessions[si];
      html += '<div class="sess-title">'+sess.title+'</div>';
      for(var ti=0;ti<sess.tasks.length;ti++) {
        var task = sess.tasks[ti];
        var ck = S[k(week,i,'t'+si+'_'+ti)] ? 'checked' : '';
        html += '<div class="task"><input type="checkbox" class="cb" '+ck+' onchange="chk('+i+','+si+','+ti+',this.checked)">';
        html += '<div class="task-text">'+task.t+(task.s ? '<div class="task-sub">'+task.s+'</div>' : '')+'</div></div>';
      }
    }

    var pl = ['None &#x1F7E2;','Mild &#x1F7E1;','Moderate &#x1F7E0;','Bad &#x1F534;'];
    html += '<div class="pain-section"><div class="pain-label">Knee Pain Today</div><div class="pain-btns">';
    for(var pi=0;pi<4;pi++) {
      var sc = pain===pi ? ' sel'+pi : '';
      html += '<button class="pbtn'+sc+'" onclick="setPain('+i+','+pi+')">'+pl[pi]+'</button>';
    }
    html += '</div></div>';

    html += '<div class="notes-section"><div class="notes-label">Notes</div>';
    html += '<textarea placeholder="How did it go? Any niggles?" onchange="setNote('+i+',this.value)">'+note+'</textarea></div>';
    html += '<button class="done-btn" onclick="toggleDone('+i+')">'+(isDone ? '&#x2713; Completed' : 'Mark Complete')+'</button>';
    html += '</div></div>';
  }

  // Knee routine
  html += '<div class="section-head">Daily Knee Routine</div>';
  html += '<div class="knee-card"><div class="knee-head">&#x1F9B5; Do this every day</div>';
  html += '<div class="knee-note">Even just 1 set. Non-negotiable while the knee is settling.</div>';
  var kex = [
    {t:'Wall sit - 45 sec', s:'2-3 sets'},
    {t:'Calf raises - 20 reps', s:'2-3 sets'},
    {t:'Tibialis raises - 15 reps', s:'2-3 sets'},
    {t:'VMO squats - 12 reps', s:'Narrow stance, slow descent. 2-3 sets'},
    {t:'Straight leg raises - 15 each leg', s:'2-3 sets'}
  ];
  for(var ki=0;ki<kex.length;ki++) {
    var kck = S['w'+week+'k'+ki] ? 'checked' : '';
    html += '<div class="task"><input type="checkbox" class="cb" '+kck+' onchange="kchk('+ki+',this.checked)">';
    html += '<div class="task-text">'+kex[ki].t+'<div class="task-sub">'+kex[ki].s+'</div></div></div>';
  }
  html += '</div>';

  document.getElementById('main').innerHTML = html;
  var pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById('pfill').style.width = pct+'%';
  document.getElementById('ptxt').textContent = done+' of '+total+' sessions completed';
  document.getElementById('wkbadge').textContent = 'Week '+week;
}

function tog(i) { S[k(week,i,'open')] = !S[k(week,i,'open')]; save(); render(); }
function chk(di,si,ti,val) { S[k(week,di,'t'+si+'_'+ti)] = val; save(); }
function toggleDone(i) { S[k(week,i,'done')] = !S[k(week,i,'done')]; save(); render(); }
function setPain(i,p) { var kk=k(week,i,'pain'); S[kk] = S[kk]===p ? -1 : p; save(); render(); }
function setNote(i,v) { S[k(week,i,'note')] = v; save(); }
function kchk(ki,val) { S['w'+week+'k'+ki] = val; save(); }
function setWeek(w,btn) {
  week = w;
  document.querySelectorAll('.wtab').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  render();
}

load();
render();
</script>
</body>
</html>
